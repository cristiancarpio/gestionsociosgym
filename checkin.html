<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Check-in">
<title>GymAdmin · Check-in</title>
<link rel="manifest" href="/manifest-checkin.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --card: #141414;
  --border: #252525;
  --accent: #e8ff47;
  --green: #00ff88;
  --red: #ff3333;
  --orange: #ff9944;
  --text: #f0f0f0;
  --muted: #444;
  --muted2: #777;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body { height:100%; width:100%; font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

/* ── IDLE ── */
#idle {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:var(--bg);
  transition:opacity .4s;
  cursor:pointer;
}
.idle-bg { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.idle-bg::before {
  content:''; position:absolute; inset:-50%;
  background-image: linear-gradient(rgba(232,255,71,.03) 1px,transparent 1px), linear-gradient(90deg,rgba(232,255,71,.03) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridmove 20s linear infinite;
}
@keyframes gridmove { 0%{transform:translate(0,0)} 100%{transform:translate(60px,60px)} }
.idle-bg::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 60% 60% at 50% 50%,transparent 40%,var(--bg) 100%); }

.idle-gym { font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,10vw,80px); letter-spacing:.18em; color:var(--accent); position:relative; z-index:1; margin-bottom:4px; }
.idle-sub { font-size:clamp(10px,2vw,13px); letter-spacing:.28em; text-transform:uppercase; color:var(--muted2); position:relative; z-index:1; margin-bottom:clamp(40px,8vw,70px); }

/* Tap to enter */
.tap-wrap { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:20px; }
.tap-ring {
  width:clamp(130px,26vw,180px); height:clamp(130px,26vw,180px);
  border-radius:50%; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  position:relative; transition:border-color .3s;
}
.tap-ring::before { content:''; position:absolute; inset:-10px; border-radius:50%; border:1px solid rgba(232,255,71,.1); animation:ringpulse 3s ease-in-out infinite; }
.tap-ring::after  { content:''; position:absolute; inset:-22px; border-radius:50%; border:1px solid rgba(232,255,71,.05); animation:ringpulse 3s ease-in-out infinite .5s; }
@keyframes ringpulse { 0%,100%{opacity:0;transform:scale(.95)} 50%{opacity:1;transform:scale(1.05)} }
.tap-ring:hover { border-color:var(--accent); }
.tap-icon { font-size:clamp(56px,12vw,86px); color:var(--muted2); transition:color .3s; line-height:1; }
.tap-ring:hover .tap-icon { color:var(--accent); }
.tap-label { font-size:clamp(11px,2.2vw,14px); letter-spacing:.2em; text-transform:uppercase; color:var(--muted2); text-align:center; }

/* Clock */
.idle-clock { position:absolute; bottom:clamp(20px,4vw,36px); left:50%; transform:translateX(-50%); text-align:center; z-index:1; }
.clock-time { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,7vw,48px); letter-spacing:.1em; color:var(--muted); line-height:1; }
.clock-date { font-size:clamp(9px,1.8vw,12px); letter-spacing:.16em; color:var(--muted); text-transform:uppercase; margin-top:3px; }

/* Admin FAB */
.admin-fab { position:fixed; bottom:20px; right:20px; width:40px; height:40px; background:var(--card); border:1px solid var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; color:var(--muted); z-index:50; transition:all .2s; }
.admin-fab:hover { border-color:var(--accent); color:var(--accent); }

/* ── DNI SCREEN ── */
#dni-screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:var(--bg);
  opacity:0; pointer-events:none;
  transition:opacity .3s;
  padding:32px;
}
#dni-screen.show { opacity:1; pointer-events:all; }
.dni-gym { font-family:'Bebas Neue',sans-serif; font-size:clamp(24px,5vw,36px); letter-spacing:.15em; color:var(--accent); margin-bottom:8px; }
.dni-hint { font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted2); margin-bottom:36px; }
.dni-field-wrap { width:100%; max-width:320px; margin-bottom:20px; }
#dni-field {
  width:100%; background:transparent; border:none;
  border-bottom:2px solid var(--border);
  color:var(--text); font-family:'Bebas Neue',sans-serif;
  font-size:clamp(48px,12vw,80px); letter-spacing:.2em;
  text-align:center; outline:none; padding:8px 0;
  caret-color:var(--accent); transition:border-color .2s;
}
#dni-field:focus { border-bottom-color:var(--accent); }
#dni-field::placeholder { color:var(--muted); font-size:clamp(28px,7vw,48px); }
.btn-dni { width:100%; max-width:320px; background:var(--accent); color:#000; border:none; padding:18px; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:.18em; cursor:pointer; margin-bottom:14px; transition:opacity .2s; }
.btn-dni:active { opacity:.8; }
.btn-dni-back { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); cursor:pointer; }
.btn-dni-back:hover { color:var(--text); }

/* Save button */
#result { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .4s; padding:24px; }
#result.show { opacity:1; pointer-events:all; }
#result.ok   { background:#030e06; }
#result.warn { background:#0e0800; }
#result.err  { background:#0e0303; }
.result-icon { font-size:clamp(64px,14vw,110px); margin-bottom:14px; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.result-name { font-family:'Bebas Neue',sans-serif; font-size:clamp(32px,7vw,64px); letter-spacing:.1em; text-align:center; line-height:1; margin-bottom:10px; animation:slideUp .35s ease .1s both; }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.result-status { font-size:clamp(12px,2.5vw,16px); letter-spacing:.2em; text-transform:uppercase; text-align:center; margin-bottom:20px; animation:slideUp .35s ease .2s both; }
.result-detail { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); padding:14px 24px; font-size:clamp(11px,2.2vw,14px); color:var(--muted2); letter-spacing:.06em; text-align:center; animation:slideUp .35s ease .3s both; max-width:380px; }
.countdown-bar { position:absolute; bottom:0; left:0; height:4px; }
#result.ok   .result-name,.ok   .result-icon { color:var(--green); }
#result.ok   .result-status { color:rgba(0,255,136,.6); }
#result.warn .result-name,.warn .result-icon { color:var(--orange); }
#result.warn .result-status { color:rgba(255,153,68,.6); }
#result.err  .result-name,.err  .result-icon { color:var(--red); }
#result.err  .result-status { color:rgba(255,51,51,.6); }
#result.ok   .countdown-bar { background:var(--green); }
#result.warn .countdown-bar { background:var(--orange); }
#result.err  .countdown-bar { background:var(--red); }

/* ── RESULT ── */
#result { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .4s; padding:24px; }
#result.show { opacity:1; pointer-events:all; }
#result.ok   { background:#030e06; }
#result.warn { background:#0e0800; }
#result.err  { background:#0e0303; }
.result-icon { font-size:clamp(64px,14vw,110px); margin-bottom:14px; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.result-name { font-family:'Bebas Neue',sans-serif; font-size:clamp(32px,7vw,64px); letter-spacing:.1em; text-align:center; line-height:1; margin-bottom:10px; animation:slideUp .35s ease .1s both; }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.result-status { font-size:clamp(12px,2.5vw,16px); letter-spacing:.2em; text-transform:uppercase; text-align:center; margin-bottom:20px; animation:slideUp .35s ease .2s both; }
.result-detail { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); padding:14px 24px; font-size:clamp(11px,2.2vw,14px); color:var(--muted2); letter-spacing:.06em; text-align:center; animation:slideUp .35s ease .3s both; max-width:380px; }
.countdown-bar { position:absolute; bottom:0; left:0; height:4px; }
#result.ok   .result-name,#result.ok   .result-icon { color:var(--green); }
#result.ok   .result-status { color:rgba(0,255,136,.6); }
#result.warn .result-name,#result.warn .result-icon { color:var(--orange); }
#result.warn .result-status { color:rgba(255,153,68,.6); }
#result.err  .result-name,#result.err  .result-icon { color:var(--red); }
#result.err  .result-status { color:rgba(255,51,51,.6); }
#result.ok   .countdown-bar { background:var(--green); }
#result.warn .countdown-bar { background:var(--orange); }
#result.err  .countdown-bar { background:var(--red); }

/* ── ADMIN PANEL ── */
#admin-panel {
  position:fixed; inset:0;
  background:rgba(0,0,0,.95);
  z-index:200;
  display:none;
  flex-direction:column;
  overflow-y:auto;
}
#admin-panel.show { display:flex; }

/* PIN screen */
#pin-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:32px; gap:20px; }
.pin-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:.12em; color:var(--muted2); }
.pin-sub { font-size:12px; color:var(--muted); letter-spacing:.08em; }
.pin-dots { display:flex; gap:14px; }
.pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:all .15s; }
.pin-dot.filled { background:var(--accent); border-color:var(--accent); }
.pin-numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:260px; }
.pin-btn { background:var(--card); border:1px solid var(--border); color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:.06em; padding:16px; cursor:pointer; border-radius:8px; transition:all .15s; text-align:center; }
.pin-btn:hover { border-color:var(--accent); color:var(--accent); }
.pin-btn:active { transform:scale(.95); }
.pin-btn.del { font-size:18px; color:var(--muted2); }
.pin-error { color:var(--red); font-size:12px; letter-spacing:.06em; min-height:16px; }

/* Admin content */
#admin-content { display:none; flex-direction:column; padding:24px; gap:0; max-width:480px; width:100%; margin:0 auto; }
#admin-content.show { display:flex; }

.admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.admin-header h2 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:.12em; color:var(--accent); }
.btn-admin-close { background:none; border:1px solid var(--border); color:var(--muted2); padding:6px 14px; font-family:'Barlow',sans-serif; font-size:12px; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:all .2s; }
.btn-admin-close:hover { border-color:var(--red); color:var(--red); }

.admin-section { margin-bottom:24px; }
.admin-section-title { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted2); font-weight:600; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.admin-field { margin-bottom:12px; }
.admin-field label { display:block; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted2); margin-bottom:6px; font-weight:600; }
.admin-inp { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:11px 14px; font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color .2s; border-radius:0; }
.admin-inp:focus { border-color:var(--accent); }
.admin-inp::placeholder { color:var(--muted); }

/* Method toggle */
.method-toggle { display:flex; gap:8px; }
.method-opt { flex:1; padding:12px; border:1px solid var(--border); background:var(--surface); color:var(--muted2); font-family:'Barlow',sans-serif; font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:all .2s; text-align:center; }
.method-opt.active { border-color:var(--accent); background:rgba(232,255,71,.06); color:var(--accent); }

/* Save button */
.btn-save { width:100%; background:var(--accent); color:#000; border:none; padding:14px; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.14em; cursor:pointer; margin-top:4px; transition:opacity .2s; }
.btn-save:active { opacity:.8; }
.btn-save.secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); margin-top:0; }
.btn-save.secondary:hover { border-color:var(--accent); color:var(--accent); }

/* Status line */
.status-line { font-size:11px; color:var(--muted2); text-align:center; margin-top:6px; min-height:16px; letter-spacing:.04em; }
.status-line.ok  { color:var(--green); }
.status-line.err { color:var(--red); }

/* Search results */
.search-wrap { position:relative; margin-bottom:10px; }
.search-results-list { max-height:180px; overflow-y:auto; margin-top:6px; }
.search-item { padding:10px 12px; background:var(--surface); border:1px solid var(--border); margin-bottom:5px; cursor:pointer; transition:border-color .2s; }
.search-item:hover { border-color:var(--accent); }
.search-item-name { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:.06em; }
.search-item-plan { font-size:11px; color:var(--muted2); }
.selected-socio { padding:10px 14px; background:rgba(232,255,71,.06); border:1px solid rgba(232,255,71,.2); margin-bottom:10px; display:none; }
.selected-socio-name { font-family:'Bebas Neue',sans-serif; font-size:17px; color:var(--accent); }

/* Toast */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a1a1a; border:1px solid #333; padding:12px 20px; font-size:13px; letter-spacing:.04em; z-index:9999; opacity:0; transition:all .35s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; pointer-events:none; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.ok  { border-left:3px solid var(--green); }
#toast.err { border-left:3px solid var(--red); }
#toast.inf { border-left:3px solid var(--accent); }
</style>
</head>
<body>

<!-- ── IDLE ── -->
<div id="idle" onclick="goToDni()">
  <div class="idle-bg"></div>
  <div class="idle-gym" id="idle-gym-name">GymAdmin</div>
  <div class="idle-sub">Sistema de acceso</div>
  <div class="tap-wrap">
    <div class="tap-ring">
      <span class="tap-icon">🪪</span>
    </div>
    <div class="tap-label">Tocá para ingresar tu DNI</div>
  </div>
  <div class="idle-clock">
    <div class="clock-time" id="clock-time">00:00</div>
    <div class="clock-date" id="clock-date">—</div>
  </div>
</div>

<!-- ── DNI SCREEN ── -->
<div id="dni-screen">
  <div class="dni-gym" id="dni-gym-name">GymAdmin</div>
  <div class="dni-hint">Ingresá tu número de DNI</div>
  <div class="dni-field-wrap">
    <input type="text" id="dni-field" inputmode="numeric" maxlength="8" placeholder="00000000" autocomplete="off">
  </div>
  <button class="btn-dni" onclick="checkDniAccess()">VERIFICAR ACCESO</button>
  <div class="btn-dni-back" onclick="showScreen('idle')">← Volver</div>
</div>

<!-- ── RESULT ── -->
<div id="result">
  <div class="result-icon" id="result-icon">✓</div>
  <div class="result-name" id="result-name">—</div>
  <div class="result-status" id="result-status">—</div>
  <div class="result-detail" id="result-detail">—</div>
  <div class="countdown-bar" id="countdown-bar" style="width:100%"></div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="admin-panel">

  <!-- PIN screen -->
  <div id="pin-screen">
    <div class="pin-title">Panel Admin</div>
    <div class="pin-sub">Ingresá el PIN de 4 dígitos</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-numpad">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn" onclick="closeAdminPanel()">✕</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>

  <!-- Admin content (shown after PIN) -->
  <div id="admin-content">
    <div class="admin-header">
      <h2>Configuración</h2>
      <button class="btn-admin-close" onclick="closeAdminPanel()">CERRAR</button>
    </div>

    <!-- Google Sheet -->
    <div class="admin-section">
      <div class="admin-section-title">Google Apps Script</div>
      <div class="admin-field">
        <label>URL del Script</label>
        <input class="admin-inp" id="cfg-url" type="url" placeholder="https://script.google.com/macros/s/...">
      </div>
      <button class="btn-save" onclick="saveUrl()">GUARDAR URL</button>
      <div class="status-line" id="url-status"></div>
    </div>

    <!-- Telegram -->
    <div class="admin-section">
      <div class="admin-section-title">Alertas por Telegram</div>
      <div class="admin-field">
        <label>Token del Bot</label>
        <input class="admin-inp" id="cfg-tg-token" type="text" placeholder="1234567890:AAFxxx...">
      </div>
      <div class="admin-field">
        <label>Chat ID</label>
        <input class="admin-inp" id="cfg-tg-chat" type="text" placeholder="123456789">
      </div>
      <button class="btn-save" onclick="saveTelegram()">GUARDAR Y PROBAR</button>
      <div class="status-line" id="tg-status"></div>
    </div>

    <!-- Nombre del gym -->
    <div class="admin-section">
      <div class="admin-section-title">Nombre del Gimnasio</div>
      <div class="admin-field">
        <label>Nombre visible en la pantalla</label>
        <input class="admin-inp" id="cfg-gym-name" type="text" placeholder="Mi Gimnasio">
      </div>
      <button class="btn-save" onclick="saveGymName()">GUARDAR NOMBRE</button>
    </div>

    <!-- Cambiar PIN -->
    <div class="admin-section">
      <div class="admin-section-title">Cambiar PIN de Admin</div>
      <div class="admin-field">
        <label>PIN actual</label>
        <input class="admin-inp" id="cfg-pin-old" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
      </div>
      <div class="admin-field">
        <label>PIN nuevo (4 dígitos)</label>
        <input class="admin-inp" id="cfg-pin-new" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
      </div>
      <button class="btn-save" onclick="changePin()">CAMBIAR PIN</button>
      <div class="status-line" id="pin-change-status"></div>
    </div>

  </div>
</div>

<div class="admin-fab" onclick="openAdminPanel()" title="Configuración">⚙</div>
<div id="toast"></div>

<script>
const KEY_URL    = 'gym_checkin_url';
const KEY_DEMO   = 'gym_checkin_demo';
const KEY_NAME   = 'gym_name';
const KEY_PIN    = 'gym_admin_pin';
const KEY_TG_TOK = 'gym_tg_token';
const KEY_TG_CID = 'gym_tg_chat_id';

let scriptUrl  = localStorage.getItem(KEY_URL) || '';
let socios     = JSON.parse(localStorage.getItem('gym_socios') || '[]');
let TG_TOKEN   = localStorage.getItem(KEY_TG_TOK) || '';
let TG_CHAT_ID = localStorage.getItem(KEY_TG_CID) || '';
let resultTimer = null;
let pinBuffer   = '';

// ── INIT ──
window.onload = () => {
  startClock();
  const name = localStorage.getItem(KEY_NAME);
  if (name) {
    document.getElementById('idle-gym-name').textContent = name;
    document.getElementById('dni-gym-name').textContent  = name;
  }
  if (scriptUrl) { loadSociosFromStorage(); syncSocios(); }
  document.getElementById('dni-field').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkDniAccess();
  });
};

// ── CLOCK ──
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('clock-time').textContent = now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('clock-date').textContent = now.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  }
  tick(); setInterval(tick, 1000);
}

// ── SCREENS ──
function showScreen(name) {
  const idle = document.getElementById('idle');
  const dni  = document.getElementById('dni-screen');
  const res  = document.getElementById('result');
  idle.style.opacity       = name==='idle' ? '1' : '0';
  idle.style.pointerEvents = name==='idle' ? 'all' : 'none';
  dni.classList.toggle('show', name==='dni');
  if (name !== 'result') res.classList.remove('show','ok','warn','err');
  if (name === 'idle') document.getElementById('dni-field').value = '';
}

function goToDni() {
  showScreen('dni');
  setTimeout(() => document.getElementById('dni-field').focus(), 100);
}

// ── DNI CHECK ──
function checkDniAccess() {
  const raw = document.getElementById('dni-field').value.replace(/\D/g,'');
  if (raw.length < 6) { showToast('Ingresá un DNI válido', 'err'); return; }

  const socio = socios.find(s => (s.dni||'').replace(/\D/g,'') === raw);
  showScreen('idle');

  if (!socio) {
    playSound('denied');
    notifyDenied({ nombre: 'DNI ' + raw, plan: '—', vencimiento: null });
    showResult('err', '✗', 'No encontrado', 'El DNI ' + raw + ' no está registrado.');
    return;
  }

  const now  = new Date(); now.setHours(0,0,0,0);
  const venc = socio.vencimiento ? new Date(String(socio.vencimiento)) : null;
  const daysLeft = venc ? Math.ceil((venc - now) / 86400000) : null;

  if (socio.status === 'vigente' && daysLeft !== null && daysLeft > 0) {
    const detail = daysLeft <= 7
      ? '⚠ Vence en ' + daysLeft + ' día' + (daysLeft===1?'':'s') + ' · ' + socio.plan
      : 'Membresía al día · ' + socio.plan + ' · Vence ' + formatDate(socio.vencimiento);
    playSound('ok');
    broadcastAccess({ type:'access_ok', nombre:socio.nombre, plan:socio.plan });
    showResult(daysLeft <= 7 ? 'warn' : 'ok', '✓', socio.nombre, detail);
  } else {
    playSound('denied');
    notifyDenied(socio);
    showResult('err', '✗', socio.nombre,
      'Membresía vencida' + (venc ? ' el ' + formatDate(socio.vencimiento) : '') + ' · ' + socio.plan);
  }
}

// ── SHOW RESULT ──
function showResult(type, icon, name, detail) {
  clearTimeout(resultTimer);
  const el  = document.getElementById('result');
  const bar = document.getElementById('countdown-bar');
  const DUR = type==='ok' ? 4000 : type==='warn' ? 6000 : 5000;
  document.getElementById('result-icon').textContent   = icon;
  document.getElementById('result-name').textContent   = name;
  document.getElementById('result-status').textContent = type==='ok' ? '✓ ACCESO PERMITIDO' : type==='warn' ? '⚠ ATENCIÓN' : '✗ ACCESO DENEGADO';
  document.getElementById('result-detail').textContent = detail;
  el.className = 'show ' + type;
  bar.style.transition = 'none'; bar.style.width = '100%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = `width ${DUR}ms linear`; bar.style.width = '0%';
  }));
  resultTimer = setTimeout(() => {
    el.classList.remove('show','ok','warn','err');
    if (scriptUrl) syncSocios();
  }, DUR);
}

// ── SYNC ──
async function syncSocios() {
  if (!scriptUrl) return;
  try {
    const res  = await fetch('/api/proxy?url=' + encodeURIComponent(scriptUrl) + '&action=get_all&t=' + Date.now());
    const data = await res.json();
    if (data.ok && data.data && data.data.Socios) {
      const parsed = data.data.Socios.map(row => {
        const id = String(row['ID'] || '').trim();
        if (!id || id === 'ID' || id.toLowerCase().includes('gymadmin')) return null;
        const venc = row['Vencimiento'] || '';
        return { id, nombre:row['Nombre']||'', plan:row['Plan']||'', vencimiento:venc, dni:row['DNI']||'', monto:row['Monto']||'', status:row['Estado']||calcStatus(venc) };
      }).filter(Boolean);
      if (parsed.length) { socios = parsed; localStorage.setItem('gym_socios', JSON.stringify(socios)); }
    }
  } catch(e) { loadSociosFromStorage(); }
}

function loadSociosFromStorage() { socios = JSON.parse(localStorage.getItem('gym_socios') || '[]'); }

function calcStatus(v) {
  if (!v) return 'pendiente';
  const n = new Date(); n.setHours(0,0,0,0);
  const d = new Date(String(v));
  if (isNaN(d.getTime())) return 'pendiente';
  return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()) >= n ? 'vigente' : 'vencido';
}

// ── NOTIFY ──
function broadcastAccess(payload) {
  // Save to Sheet so admin can see it
  const entry = {
    id:     'i' + Date.now(),
    nombre: payload.nombre || '—',
    plan:   payload.plan   || '—',
    tipo:   payload.type === 'access_ok' ? 'ok' : 'denegado',
    hora:   new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}),
    fecha:  new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}),
    venc:   payload.venc || ''
  };
  if (scriptUrl) {
    fetch('/api/proxy?url=' + encodeURIComponent(scriptUrl), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'sync_ingreso', data: entry })
    }).catch(()=>{});
  }
}

async function notifyDenied(socio) {
  const hora = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const venc = socio.vencimiento ? formatDate(String(socio.vencimiento)) : '—';
  broadcastAccess({ type:'access_denied', nombre:socio.nombre, plan:socio.plan, venc });
  if (TG_TOKEN && TG_CHAT_ID) {
    const msg = `🚨 *Acceso denegado*\n👤 ${socio.nombre}\n📋 ${socio.plan}\n📅 Venció el ${venc}\n🕐 ${hora}hs`;
    try { await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:TG_CHAT_ID, text:msg, parse_mode:'Markdown'}) }); } catch(e){}
  }
  if (scriptUrl) {
    try { await fetch('/api/proxy?url=' + encodeURIComponent(scriptUrl), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'sync_alerta', data:{id:'a'+Date.now(), fecha:new Date().toLocaleString('es-AR'), nombre:socio.nombre, plan:socio.plan, vencimiento:venc}}) }); } catch(e){}
  }
}

// ── SOUNDS ──
function playSound(type) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    if (type==='ok') {
      [0,.18].forEach((d,i) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=520+i*160; g.gain.setValueAtTime(.2,ctx.currentTime+d); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.18); o.start(ctx.currentTime+d); o.stop(ctx.currentTime+d+.18); });
    } else {
      [0,.25,.5].forEach((d,i) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='square'; o.frequency.value=440-i*80; g.gain.setValueAtTime(.25,ctx.currentTime+d); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.2); o.start(ctx.currentTime+d); o.stop(ctx.currentTime+d+.2); });
    }
  } catch(e){}
}

// ── ADMIN PANEL ──
function openAdminPanel() {
  pinBuffer = ''; updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('admin-content').classList.remove('show');
  document.getElementById('admin-panel').classList.add('show');
}

function closeAdminPanel() {
  document.getElementById('admin-panel').classList.remove('show');
  pinBuffer = '';
}

function pinPress(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d; updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}

function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); }

function updatePinDots() {
  for (let i=0; i<4; i++) document.getElementById('dot-'+i).classList.toggle('filled', i < pinBuffer.length);
}

function checkPin() {
  const saved = localStorage.getItem(KEY_PIN) || '1234';
  if (pinBuffer === saved) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('admin-content').classList.add('show');
    document.getElementById('cfg-url').value      = scriptUrl || '';
    document.getElementById('cfg-tg-token').value = TG_TOKEN  || '';
    document.getElementById('cfg-tg-chat').value  = TG_CHAT_ID|| '';
    document.getElementById('cfg-gym-name').value = localStorage.getItem(KEY_NAME) || '';
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorrecto';
    pinBuffer = ''; updatePinDots();
    setTimeout(()=>{ document.getElementById('pin-error').textContent=''; }, 1500);
  }
}

function saveUrl() {
  const url = document.getElementById('cfg-url').value.trim();
  if (!url || !url.startsWith('https://script.google.com')) {
    setStatus('url-status','⚠ URL inválida','err'); return;
  }
  scriptUrl = url; localStorage.setItem(KEY_URL, url);
  setStatus('url-status','✓ Guardado — sincronizando...','ok');
  syncSocios();
}

async function saveTelegram() {
  const token  = document.getElementById('cfg-tg-token').value.trim();
  const chatId = document.getElementById('cfg-tg-chat').value.trim();
  if (!token || !chatId) { setStatus('tg-status','⚠ Completá los dos campos','err'); return; }
  TG_TOKEN = token; TG_CHAT_ID = chatId;
  localStorage.setItem(KEY_TG_TOK, token);
  localStorage.setItem(KEY_TG_CID, chatId);
  setStatus('tg-status','Enviando mensaje de prueba...','');
  try {
    const r = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:chatId, text:'✅ GymAdmin conectado correctamente.'}) });
    const j = await r.json();
    setStatus('tg-status', j.ok ? '✓ Mensaje enviado' : '⚠ Error: '+j.description, j.ok?'ok':'err');
  } catch(e) { setStatus('tg-status','⚠ No se pudo conectar','err'); }
}

function saveGymName() {
  const name = document.getElementById('cfg-gym-name').value.trim();
  if (!name) return;
  localStorage.setItem(KEY_NAME, name);
  document.getElementById('idle-gym-name').textContent = name;
  document.getElementById('dni-gym-name').textContent  = name;
  showToast('✓ Nombre guardado', 'ok');
}

function changePin() {
  const oldPin = document.getElementById('cfg-pin-old').value.trim();
  const newPin = document.getElementById('cfg-pin-new').value.trim();
  const saved  = localStorage.getItem(KEY_PIN) || '1234';
  if (oldPin !== saved) { setStatus('pin-change-status','⚠ PIN actual incorrecto','err'); return; }
  if (!/^\d{4}$/.test(newPin)) { setStatus('pin-change-status','⚠ El PIN debe ser 4 dígitos','err'); return; }
  localStorage.setItem(KEY_PIN, newPin);
  setStatus('pin-change-status','✓ PIN actualizado','ok');
  document.getElementById('cfg-pin-old').value = '';
  document.getElementById('cfg-pin-new').value = '';
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status-line' + (type ? ' '+type : '');
}

// ── UTILS ──
function formatDate(d) {
  if (!d) return '';
  const date = new Date(String(d));
  if (!isNaN(date.getTime())) return `${String(date.getUTCDate()).padStart(2,'0')}/${String(date.getUTCMonth()+1).padStart(2,'0')}/${date.getUTCFullYear()}`;
  const p = d.split('-');
  return p.length >= 3 ? `${p[2].slice(0,2)}/${p[1]}/${p[0]}` : d;
}

let toastT;
function showToast(msg, type='inf') {
  clearTimeout(toastT);
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  toastT = setTimeout(()=>{ t.className=''; }, 3000);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
